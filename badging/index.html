<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>AP Badging</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2c3e50">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <style>
    :root {
      --primary:   #2c3e50;
      --success:   #2ecc71;
      --warning:   #f1c40f;
      --danger:    #e74c3c;
      --bg:        #f8f9fa;
      --card-bg:   #ffffff;
      --text:      #2c3e50;
      --link-color:#3498db;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
    body { background: var(--bg); color: var(--text); padding: 15px;
           display: flex; justify-content: center; }
    .container { width: 100%; max-width: 500px; background: var(--card-bg);
                 border-radius: 20px; padding: 20px;
                 box-shadow: 0 10px 20px rgba(0,0,0,.05); }
    h1 { font-size: 22px; text-align: center; margin-bottom: 20px;
         color: var(--primary); font-weight: 800; letter-spacing: .5px; }

    .status-badge { text-align: center; padding: 8px; border-radius: 10px;
                    font-weight: bold; margin-bottom: 15px; font-size: 14px; }
    .status-bereit    { background: #e0e0e0; }
    .status-arbeit    { background: #d4edda; color: #155724; }
    .status-pause     { background: #fff3cd; color: #856404; }
    .status-feierabend{ background: #cce5ff; color: #004085; }

    .display-section { text-align: center; margin-bottom: 15px; }
    .time-box  { font-size: 38px; font-weight: 700; margin: 5px 0;
                 font-variant-numeric: tabular-nums; }
    .overtime  { color: var(--success); }

    .progress-container { width: 100%; background: #e9ecef; height: 8px;
                          border-radius: 4px; margin-bottom: 25px; overflow: hidden; }
    .progress-bar { width: 0%; height: 100%; background: var(--link-color);
                    transition: width .5s ease, background-color .5s ease; }

    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
                 margin-bottom: 20px; font-size: 14px; }
    .info-card { background: #f1f3f5; padding: 10px; border-radius: 10px; text-align: center; }
    .info-card span { display: block; font-weight: bold; font-size: 16px; margin-top: 5px; }

    .slider-section { background: #fdfdfd; border: 1px solid #e9ecef; padding: 15px;
                      border-radius: 15px; margin-bottom: 20px; }
    .slider-label { display: flex; justify-content: space-between; font-size: 14px;
                    margin-bottom: 8px; }
    .slider { width: 100%; -webkit-appearance: none; height: 8px; border-radius: 5px;
              background: #dee2e6; outline: none; }
    .slider::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px;
                                    border-radius: 50%; background: var(--primary); cursor: pointer; }

    .btn { width: 100%; padding: 14px; border: none; border-radius: 12px;
           font-size: 16px; font-weight: bold; color: white; cursor: pointer;
           margin-bottom: 10px; transition: opacity .2s; }
    .btn-start    { background: var(--success); }
    .btn-pause    { background: var(--warning); color: #333; }
    .btn-stop     { background: var(--danger); }
    .btn-link     { background: transparent; border: 2px solid var(--link-color);
                    color: var(--link-color); text-decoration: none; display: block;
                    text-align: center; padding: 12px; border-radius: 12px;
                    font-size: 14px; font-weight: bold; margin-bottom: 15px; }
    .btn-disabled { opacity: .15; cursor: not-allowed; pointer-events: none; }
    .btn-reset    { background: transparent; border: none; color: #bdc3c7; font-size: 11px;
                    cursor: pointer; text-decoration: underline;
                    display: block; margin: 15px auto 0; }

    #notifBanner { display: none; background: #fff3cd; border: 1px solid #f1c40f;
                   border-radius: 10px; padding: 10px 14px; margin-bottom: 15px;
                   font-size: 13px; color: #856404; text-align: center; cursor: pointer; }
  </style>
</head>
<body>
<div class="container">
  <h1>Royal Oak Arbeitszeit</h1>

  <div id="notifBanner" onclick="requestNotifPermission()">
    🔔 Benachrichtigungen erlauben, damit du Erinnerungen erhältst
  </div>

  <div id="statusBadge" class="status-badge status-bereit">Lade...</div>

  <a href="https://aptime.cloud-horoquartz.fr" target="_blank" class="btn-link">
    🌐 AP Time öffnen
  </a>

  <div class="display-section">
    <div id="countdownLabel" style="font-size:13px;color:#7f8c8d;">Verbleibende Sollzeit:</div>
    <div id="mainTimer" class="time-box">08:25:00</div>
  </div>

  <div class="progress-container">
    <div id="progressBar" class="progress-bar"></div>
  </div>

  <div class="info-grid">
    <div class="info-card">Kommen Zeit:<span id="lblKommen">--:--</span></div>
    <div class="info-card">Geplanter Feierabend:<span id="lblFeierabend">--:--</span></div>
    <div class="info-card">Reale Arbeitszeit:<span id="lblRealeZeit">00:00</span></div>
    <div class="info-card">Pause (aktuell / geplant):<span id="lblPause">0 Min</span></div>
  </div>

  <div class="slider-section" id="sliderContainer">
    <div class="slider-label">
      <span>Geplante Mittagspause:</span>
      <span id="sliderValue" style="font-weight:bold;">45 Minuten</span>
    </div>
    <input type="range" min="15" max="120" value="45" step="5" class="slider" id="pauseSlider">
  </div>

  <button id="btnKommen" class="btn btn-start btn-disabled">Arbeitsbeginn (Kommen)</button>
  <button id="btnPause"  class="btn btn-pause  btn-disabled">Pause starten</button>
  <button id="btnGehen"  class="btn btn-stop   btn-disabled">Feierabend (Gehen)</button>

  <button id="btnReset" class="btn-reset">System-Reset (Testmodus)</button>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// CONSTANTS
// ─────────────────────────────────────────────────────────────────────────────
const SOLL_MS   = ((8 * 60) + 25) * 60 * 1000;   // 8h 25min in ms
const STORE_KEY = 'apBadgingState_v1';

// ─────────────────────────────────────────────────────────────────────────────
// UI STATE  (Date objects, ms — same shape as the old GAS version)
// ─────────────────────────────────────────────────────────────────────────────
let state = {
  status:                         'BEREIT',
  kommenZeit:                     null,   // Date
  gehenZeit:                      null,   // Date
  geplantePauseMinuten:           45,
  realePauseMillisekunden:        0,
  uiPauseStartZeit:               null,   // Date
  letzteFeierabendErinnerung:     null,
  mittagErinnerungAbgefeuert:     false,
  pauseEndeErinnerungAbgefeuert:  false
};

// ─────────────────────────────────────────────────────────────────────────────
// DOM REFS
// ─────────────────────────────────────────────────────────────────────────────
const btnKommen      = document.getElementById('btnKommen');
const btnPause       = document.getElementById('btnPause');
const btnGehen       = document.getElementById('btnGehen');
const btnReset       = document.getElementById('btnReset');
const pauseSlider    = document.getElementById('pauseSlider');
const sliderValue    = document.getElementById('sliderValue');
const mainTimer      = document.getElementById('mainTimer');
const progressBar    = document.getElementById('progressBar');
const lblKommen      = document.getElementById('lblKommen');
const lblFeierabend  = document.getElementById('lblFeierabend');
const lblRealeZeit   = document.getElementById('lblRealeZeit');
const lblPause       = document.getElementById('lblPause');
const statusBadge    = document.getElementById('statusBadge');
const countdownLabel = document.getElementById('countdownLabel');
const notifBanner    = document.getElementById('notifBanner');

// ─────────────────────────────────────────────────────────────────────────────
// LOCAL STORAGE BACKEND  (replaces google.script.run)
// ─────────────────────────────────────────────────────────────────────────────

function defaultStorage() {
  return {
    status:               'BEREIT',
    kommenZeit:           null,
    gehenZeit:            null,
    geplantePauseMinuten: 45,
    realePauseMinuten:    0,
    uiPauseStartZeit:     null,
    letzterTag:           new Date().toDateString()
  };
}

/** Read state from localStorage; auto-resets for a new day. */
function loadStorage() {
  const heute = new Date().toDateString();
  try {
    const s = JSON.parse(localStorage.getItem(STORE_KEY));
    if (!s || s.letzterTag !== heute) {
      return { ...defaultStorage(), letzterTag: heute };
    }
    return s;
  } catch {
    return { ...defaultStorage(), letzterTag: heute };
  }
}

/** Persist and sync to service worker. */
function saveStorage(s) {
  localStorage.setItem(STORE_KEY, JSON.stringify(s));
  if (navigator.serviceWorker?.controller) {
    navigator.serviceWorker.controller.postMessage({ type: 'STATE_UPDATE', state: s });
  }
}

/** Mirror of the GAS stempeln() function. */
function stempeln_local(aktion, geplantePause) {
  const s    = loadStorage();
  const jetzt = Date.now();
  s.geplantePauseMinuten = geplantePause;
  s.letzterTag = new Date().toDateString();

  if (aktion === 'KOMMEN') {
    s.status             = 'ARBEIT';
    s.kommenZeit         = jetzt;
    s.realePauseMinuten  = 0;
    s.uiPauseStartZeit   = null;
    s.gehenZeit          = null;

  } else if (aktion === 'PAUSE_START') {
    s.status           = 'PAUSE';
    s.uiPauseStartZeit = jetzt;

  } else if (aktion === 'PAUSE_ENDE') {
    s.status = 'ARBEIT';
    const ms = jetzt - (s.uiPauseStartZeit || jetzt);
    s.realePauseMinuten  = (s.realePauseMinuten || 0) + Math.round(ms / 60000);
    s.uiPauseStartZeit   = null;

  } else if (aktion === 'GEHEN') {
    if (s.status === 'PAUSE' && s.uiPauseStartZeit) {
      const ms = jetzt - s.uiPauseStartZeit;
      s.realePauseMinuten = (s.realePauseMinuten || 0) + Math.round(ms / 60000);
      s.uiPauseStartZeit  = null;
    }
    s.status    = 'BEENDET';
    s.gehenZeit = jetzt;
  }

  saveStorage(s);
  return s;
}

function updatePause_local(min) {
  const s = loadStorage();
  s.geplantePauseMinuten = min;
  saveStorage(s);
  return s;
}

function reset_local() {
  localStorage.removeItem(STORE_KEY);
  const fresh = defaultStorage();
  saveStorage(fresh);
  return fresh;
}

// ─────────────────────────────────────────────────────────────────────────────
// SERVICE WORKER + NOTIFICATIONS
// ─────────────────────────────────────────────────────────────────────────────

async function registerSW() {
  if (!('serviceWorker' in navigator)) return;
  try {
    await navigator.serviceWorker.register('./sw.js');
    const reg = await navigator.serviceWorker.ready;
    // Sync current state so SW can schedule notifications
    const ctrl = navigator.serviceWorker.controller;
    if (ctrl) ctrl.postMessage({ type: 'STATE_UPDATE', state: loadStorage() });
  } catch (err) {
    console.warn('SW registration failed:', err);
  }
}

async function requestNotifPermission() {
  if (!('Notification' in window)) return;
  const result = await Notification.requestPermission();
  updateNotifBanner();
  if (result === 'granted') {
    // Resync so SW schedules now that we have permission
    const ctrl = navigator.serviceWorker?.controller;
    if (ctrl) ctrl.postMessage({ type: 'STATE_UPDATE', state: loadStorage() });
  }
}

function updateNotifBanner() {
  if (!('Notification' in window)) return;
  notifBanner.style.display = Notification.permission === 'default' ? 'block' : 'none';
}

function sendNotification(title, body) {
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification(title, { body, icon: './icon.svg' });
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// STATE → UI  (same shape as old verarbeiteServerStatus)
// ─────────────────────────────────────────────────────────────────────────────

function verarbeiteStatus(srv) {
  state.status                = srv.status;
  state.kommenZeit            = srv.kommenZeit        ? new Date(srv.kommenZeit)        : null;
  state.gehenZeit             = srv.gehenZeit         ? new Date(srv.gehenZeit)         : null;
  state.geplantePauseMinuten  = srv.geplantePauseMinuten;
  state.realePauseMillisekunden = (srv.realePauseMinuten || 0) * 60000;
  state.uiPauseStartZeit      = srv.uiPauseStartZeit  ? new Date(srv.uiPauseStartZeit)  : null;

  pauseSlider.value   = state.geplantePauseMinuten;
  sliderValue.innerText = state.geplantePauseMinuten + ' Minuten';

  updateUIForStatus();
}

// ─────────────────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────────────────

window.addEventListener('load', async () => {
  await registerSW();
  updateNotifBanner();
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission().then(updateNotifBanner);
  }
  verarbeiteStatus(loadStorage());
  setInterval(updateTicker, 1000);
});

// ─────────────────────────────────────────────────────────────────────────────
// BUTTON EVENTS
// ─────────────────────────────────────────────────────────────────────────────

pauseSlider.addEventListener('input', e => {
  state.geplantePauseMinuten = parseInt(e.target.value, 10);
  sliderValue.innerText = state.geplantePauseMinuten + ' Minuten';
  updateFeierabendAnzeige();
  if (state.status === 'BEENDET' && state.realePauseMillisekunden === 0) updateBeendetAnzeige();
});

pauseSlider.addEventListener('change', e => {
  const beendetOhne = state.status === 'BEENDET' && state.realePauseMillisekunden === 0;
  if (state.status === 'ARBEIT' || state.status === 'BEREIT' || beendetOhne) {
    verarbeiteStatus(updatePause_local(state.geplantePauseMinuten));
  }
});

btnKommen.addEventListener('click', () =>
  verarbeiteStatus(stempeln_local('KOMMEN', state.geplantePauseMinuten)));

btnPause.addEventListener('click', () => {
  const aktion = state.status === 'ARBEIT' ? 'PAUSE_START' : 'PAUSE_ENDE';
  verarbeiteStatus(stempeln_local(aktion, state.geplantePauseMinuten));
});

btnGehen.addEventListener('click', () =>
  verarbeiteStatus(stempeln_local('GEHEN', state.geplantePauseMinuten)));

btnReset.addEventListener('click', () => {
  if (!confirm('System zurücksetzen?')) return;
  state.mittagErinnerungAbgefeuert    = false;
  state.pauseEndeErinnerungAbgefeuert = false;
  state.letzteFeierabendErinnerung    = null;
  verarbeiteStatus(reset_local());
});

// ─────────────────────────────────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────────────────────────────────

function formatUhrzeit(date) {
  if (!date) return '--:--';
  return date.toLocaleTimeString('de-CH', { hour: '2-digit', minute: '2-digit' });
}

function formatDauer(ms) {
  const abs = Math.abs(ms);
  const s   = Math.floor(abs / 1000);
  const h   = Math.floor(s / 3600);
  const m   = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

/** Effective pause ms: button-based pause has priority; otherwise slider. */
function berechneEffektivePauseMs() {
  const jetzt = new Date();
  if (state.realePauseMillisekunden > 0 || state.status === 'PAUSE') {
    let p = state.realePauseMillisekunden;
    if (state.status === 'PAUSE' && state.uiPauseStartZeit) p += (jetzt - state.uiPauseStartZeit);
    return p;
  }
  return state.geplantePauseMinuten * 60000;
}

function berechneFeierabendUhrzeit() {
  const basis = state.kommenZeit || new Date();
  return new Date(basis.getTime() + SOLL_MS + berechneEffektivePauseMs());
}

function updateFeierabendAnzeige() {
  lblFeierabend.innerText = state.kommenZeit ? formatUhrzeit(berechneFeierabendUhrzeit()) : '--:--';
}

function updateBeendetAnzeige() {
  const pauseMs = state.realePauseMillisekunden > 0
    ? state.realePauseMillisekunden
    : state.geplantePauseMinuten * 60000;
  const end    = state.gehenZeit ? state.gehenZeit.getTime() : Date.now();
  const netto  = (end - state.kommenZeit.getTime()) - pauseMs;
  const ueber  = netto - SOLL_MS;

  lblRealeZeit.innerText = formatDauer(Math.max(0, netto)).substring(0, 5) + ' Std';
  lblPause.innerText     = Math.round(pauseMs / 60000) + ' Min';

  if (ueber >= 0) {
    mainTimer.innerText = '+' + formatDauer(ueber);
    mainTimer.className = 'time-box overtime';
    mainTimer.style.color = '';
  } else {
    mainTimer.innerText = '-' + formatDauer(Math.abs(ueber));
    mainTimer.className = 'time-box';
    mainTimer.style.color = 'var(--danger)';
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// UI FOR STATUS
// ─────────────────────────────────────────────────────────────────────────────

function setSlider(enabled) {
  const sc = document.getElementById('sliderContainer');
  sc.style.opacity       = enabled ? '1'    : '0.5';
  sc.style.pointerEvents = enabled ? 'auto' : 'none';
}

function updateUIForStatus() {
  btnKommen.className = 'btn btn-start btn-disabled';
  btnPause.className  = 'btn btn-pause  btn-disabled';
  btnGehen.className  = 'btn btn-stop   btn-disabled';
  mainTimer.style.color = '';

  if (state.status === 'BEREIT') {
    btnKommen.className = 'btn btn-start';
    statusBadge.className = 'status-badge status-bereit';
    statusBadge.innerText = 'Bereit für den Arbeitstag';
    setSlider(true);
    lblKommen.innerText = '--:--';
    mainTimer.innerText = '08:25:00';
    progressBar.style.width = '0%';
    progressBar.style.backgroundColor = 'var(--link-color)';
    countdownLabel.innerText = 'Verbleibende Sollzeit:';
    countdownLabel.style.color = '#6c757d';

  } else if (state.status === 'ARBEIT') {
    btnPause.className  = 'btn btn-pause';
    btnPause.innerText  = 'Pause starten';
    btnGehen.className  = 'btn btn-stop';
    statusBadge.className = 'status-badge status-arbeit';
    statusBadge.innerText = 'Zeiterfassung läuft...';
    lblKommen.innerText = formatUhrzeit(state.kommenZeit);
    setSlider(state.realePauseMillisekunden === 0);

  } else if (state.status === 'PAUSE') {
    btnPause.className  = 'btn btn-pause';
    btnPause.innerText  = 'Pause beenden (Weiterarbeiten)';
    btnGehen.className  = 'btn btn-stop';
    statusBadge.className = 'status-badge status-pause';
    statusBadge.innerText = 'In der Mittagspause';
    setSlider(false);

  } else if (state.status === 'BEENDET') {
    statusBadge.className = 'status-badge status-feierabend';
    statusBadge.innerText = 'Arbeitstag beendet';
    countdownLabel.innerText = 'Tagesergebnis (Überstunden):';
    progressBar.style.width = '100%';
    progressBar.style.backgroundColor = '#34495e';
    if (state.kommenZeit) lblKommen.innerText = formatUhrzeit(state.kommenZeit);
    // Slider stays active if no button-pause was recorded (manual correction possible)
    setSlider(state.realePauseMillisekunden === 0);
    updateBeendetAnzeige();
  }

  updateFeierabendAnzeige();
}

// ─────────────────────────────────────────────────────────────────────────────
// TICKER  (runs every second)
// ─────────────────────────────────────────────────────────────────────────────

function updateTicker() {
  if (state.status === 'BEREIT' || state.status === 'BEENDET') return;

  const jetzt = new Date();
  const hm    = jetzt.getHours() * 100 + jetzt.getMinutes();

  // ── In-app fallback notifications (SW handles these when app is closed) ──
  if (hm >= 1230 && hm < 1330 && !state.mittagErinnerungAbgefeuert) {
    if (state.status === 'ARBEIT' && state.realePauseMillisekunden === 0) {
      sendNotification('🍽️ Mittagspause?',
        'Es ist nach 12:30 Uhr. Hast du vergessen, die Pause einzutragen?');
      state.mittagErinnerungAbgefeuert = true;
    }
  }
  if (hm >= 1330 && !state.pauseEndeErinnerungAbgefeuert) {
    if (state.status === 'PAUSE') {
      sendNotification('⚠️ Pause beenden!',
        'Es ist nach 13:30 Uhr. Du bist laut App immer noch in der Pause.');
      state.pauseEndeErinnerungAbgefeuert = true;
    }
  }

  // ── Pause display ──────────────────────────────────────────────────────────
  let anzeigePauseMs;
  if (state.realePauseMillisekunden > 0 || state.status === 'PAUSE') {
    anzeigePauseMs = state.realePauseMillisekunden;
    if (state.status === 'PAUSE' && state.uiPauseStartZeit)
      anzeigePauseMs += (jetzt - state.uiPauseStartZeit);
    lblPause.innerText = Math.round(anzeigePauseMs / 60000) + ' Min';
  } else {
    anzeigePauseMs = state.geplantePauseMinuten * 60000;
    lblPause.innerText = state.geplantePauseMinuten + ' Min (Schieber)';
  }

  // ── Netto-Arbeitszeit ──────────────────────────────────────────────────────
  const hasButtonPause = state.realePauseMillisekunden > 0 || state.status === 'PAUSE';
  const nettoMs = hasButtonPause
    ? jetzt - state.kommenZeit - anzeigePauseMs
    : jetzt - state.kommenZeit;
  lblRealeZeit.innerText = formatDauer(Math.max(0, nettoMs)).substring(0, 5) + ' Std';

  // ── Countdown to Feierabend ────────────────────────────────────────────────
  updateFeierabendAnzeige();
  const feierabend = berechneFeierabendUhrzeit();
  const restMs     = feierabend - jetzt;

  // Progress bar: fraction of elapsed time between Kommen and Feierabend
  const totalMs    = feierabend.getTime() - state.kommenZeit.getTime();
  const vergangenMs= jetzt.getTime()      - state.kommenZeit.getTime();
  progressBar.style.width = Math.max(0, Math.min(100, (vergangenMs / totalMs) * 100)) + '%';

  if (restMs > 0) {
    countdownLabel.innerText = 'Zeit bis Feierabend:';
    countdownLabel.style.color = '#6c757d';
    mainTimer.innerText = formatDauer(restMs);
    mainTimer.classList.remove('overtime');
    mainTimer.style.color = '';
    progressBar.style.backgroundColor = 'var(--link-color)';
  } else {
    countdownLabel.innerText = 'Überstunden angesammelt:';
    countdownLabel.style.color = 'var(--success)';
    mainTimer.innerText = '+' + formatDauer(Math.abs(restMs));
    mainTimer.classList.add('overtime');
    progressBar.style.backgroundColor = 'gold';

    if (state.status === 'ARBEIT' || state.status === 'PAUSE') {
      const interval = 15 * 60000;
      if (!state.letzteFeierabendErinnerung) {
        sendNotification('FEIERABEND!',
          'Du hast deine Sollarbeitszeit erreicht. Vergiss das Ausstempeln nicht!');
        state.letzteFeierabendErinnerung = jetzt;
      } else if (jetzt - state.letzteFeierabendErinnerung >= interval) {
        const min = Math.floor(Math.abs(restMs) / 60000);
        sendNotification('Immer noch eingestempelt!',
          `Du bist seit ${min} Minuten im Feierabend. Bitte ausstempeln!`);
        state.letzteFeierabendErinnerung = jetzt;
      }
    }
  }
}
</script>
</body>
</html>
